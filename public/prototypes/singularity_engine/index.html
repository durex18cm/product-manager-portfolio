<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>奇点加速引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" crossorigin href="https://singularity-engine-three.vercel.app/assets/index-DTGqSJ7W.css" />
    <style>
      body {
        background: #000;
        margin: 0;
        overflow: hidden;
        font-family: "Rajdhani", sans-serif;
      }

      .font-sci-fi {
        font-family: "Orbitron", sans-serif;
      }

      .launch-gate {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        color: #d9fbff;
        background:
          radial-gradient(circle at 50% 45%, rgba(16, 185, 129, 0.16), transparent 24%),
          radial-gradient(circle at 22% 18%, rgba(34, 211, 238, 0.2), transparent 28%),
          radial-gradient(circle at 76% 72%, rgba(248, 113, 113, 0.16), transparent 24%),
          #020305;
      }

      .launch-gate::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 18% 38%, rgba(255, 79, 79, 0.8) 0 2px, transparent 3px),
          radial-gradient(circle at 72% 24%, rgba(34, 211, 238, 0.7) 0 1px, transparent 3px),
          radial-gradient(circle at 61% 78%, rgba(255, 79, 79, 0.7) 0 2px, transparent 4px),
          radial-gradient(circle at 32% 70%, rgba(34, 211, 238, 0.6) 0 1px, transparent 3px);
        background-size: 210px 180px, 260px 220px, 240px 190px, 180px 160px;
        opacity: 0.64;
        animation: gateDrift 7s linear infinite;
      }

      .launch-card {
        position: relative;
        width: min(440px, calc(100vw - 42px));
        padding: 28px;
        border: 1px solid rgba(34, 211, 238, 0.44);
        background: rgba(2, 8, 14, 0.82);
        box-shadow: 0 0 42px rgba(34, 211, 238, 0.22), inset 0 0 26px rgba(34, 211, 238, 0.08);
        backdrop-filter: blur(14px);
      }

      .launch-kicker {
        color: #22d3ee;
        font: 700 12px/1.4 "Orbitron", monospace;
        letter-spacing: 0.36em;
        text-transform: uppercase;
      }

      .launch-card h1 {
        margin: 10px 0 8px;
        color: #eaffff;
        font: 900 clamp(30px, 7vw, 52px) / 0.95 "Orbitron", monospace;
        letter-spacing: 0.02em;
      }

      .launch-card p {
        margin: 0 0 22px;
        color: rgba(220, 250, 255, 0.78);
        font-size: 16px;
        line-height: 1.65;
      }

      .launch-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      .launch-button,
      .source-link {
        min-height: 46px;
        border: 1px solid rgba(34, 211, 238, 0.72);
        color: #dffcff;
        background: rgba(8, 145, 178, 0.2);
        padding: 0 18px;
        font: 800 13px/1 "Orbitron", monospace;
        letter-spacing: 0.12em;
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .source-link {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        color: rgba(216, 250, 255, 0.78);
        border-color: rgba(216, 250, 255, 0.26);
        background: rgba(255, 255, 255, 0.04);
      }

      .launch-button:hover,
      .launch-button:focus-visible,
      .source-link:hover,
      .source-link:focus-visible {
        outline: none;
        transform: translateY(-1px);
        background: rgba(8, 145, 178, 0.32);
        box-shadow: 0 0 24px rgba(34, 211, 238, 0.24);
      }

      .launch-status {
        min-height: 24px;
        margin-top: 18px;
        color: rgba(165, 243, 252, 0.9);
        font: 600 14px/1.6 "Rajdhani", sans-serif;
      }

      .launch-status.is-error {
        color: #fecaca;
      }

      .launch-gate.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      @keyframes gateDrift {
        from {
          transform: translate3d(0, 0, 0);
        }
        to {
          transform: translate3d(-80px, -64px, 0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <section class="launch-gate" id="launchGate" aria-label="启动奇点加速引擎">
      <div class="launch-card">
        <div class="launch-kicker">Singularity Engine</div>
        <h1>奇点加速引擎</h1>
        <p>此作品需要真实摄像头用于手势识别，并使用麦克风处理语音指令。点击启动后，请允许浏览器权限。</p>
        <div class="launch-actions">
          <button class="launch-button" id="launchButton" type="button">启动作品</button>
          <a class="source-link" href="https://singularity-engine-three.vercel.app/" target="_blank" rel="noreferrer">打开原站</a>
        </div>
        <div class="launch-status" id="launchStatus">等待授权 CAMERA / MICROPHONE</div>
      </div>
    </section>
    <script>
      (() => {
        const appScript = "https://singularity-engine-three.vercel.app/assets/index-Bf7z_Yyl.js";
        const originalGetUserMedia = navigator.mediaDevices && navigator.mediaDevices.getUserMedia
          ? navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices)
          : null;
        let grantedStream = null;
        let loaded = false;

        function setStatus(message, isError = false) {
          const status = document.getElementById("launchStatus");
          if (!status) return;
          status.textContent = message;
          status.classList.toggle("is-error", isError);
        }

        function createSilentAudioTrack() {
          const AudioCtor = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtor) return null;
          const audio = new AudioCtor();
          const oscillator = audio.createOscillator();
          const gain = audio.createGain();
          const destination = audio.createMediaStreamDestination();
          gain.gain.value = 0.0001;
          oscillator.frequency.value = 60;
          oscillator.connect(gain);
          gain.connect(destination);
          oscillator.start();
          window.__singularitySilentAudio = { audio, oscillator, destination };
          return destination.stream.getAudioTracks()[0] || null;
        }

        async function requestRealMedia() {
          if (!originalGetUserMedia) {
            throw new Error("当前浏览器不支持摄像头/麦克风权限。");
          }

          const video = {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            facingMode: "user",
          };

          try {
            return await originalGetUserMedia({ video, audio: true });
          } catch (error) {
            setStatus("麦克风可能被占用或拒绝，正在尝试仅启用摄像头...");
            const videoOnly = await originalGetUserMedia({ video, audio: false });
            const silentTrack = createSilentAudioTrack();
            if (silentTrack) videoOnly.addTrack(silentTrack);
            window.__singularityMicrophoneFallback = true;
            return videoOnly;
          }
        }

        function installMediaBridge() {
          if (!navigator.mediaDevices) {
            Object.defineProperty(navigator, "mediaDevices", {
              configurable: true,
              value: {},
            });
          }

          navigator.mediaDevices.getUserMedia = async () => {
            const liveVideo = grantedStream && grantedStream.getVideoTracks().some((track) => track.readyState === "live");
            if (liveVideo) return grantedStream;
            grantedStream = await requestRealMedia();
            return grantedStream;
          };
        }

        function loadApp() {
          if (loaded) return;
          loaded = true;
          window.__singularityGrantedStream = grantedStream;
          installMediaBridge();
          document.getElementById("launchGate")?.classList.add("is-hidden");
          const script = document.createElement("script");
          script.type = "module";
          script.crossOrigin = "anonymous";
          script.src = appScript;
          script.onerror = () => {
            loaded = false;
            document.getElementById("launchGate")?.classList.remove("is-hidden");
            setStatus("作品资源加载失败，请检查网络后重试。", true);
          };
          document.body.appendChild(script);
        }

        async function launch() {
          const button = document.getElementById("launchButton");
          if (button) button.disabled = true;
          setStatus("正在请求摄像头与麦克风权限...");
          try {
            grantedStream = await requestRealMedia();
            setStatus("权限已通过，正在启动引擎...");
            loadApp();
          } catch (error) {
            if (button) button.disabled = false;
            console.warn("Singularity Engine media permission failed:", error);
            setStatus("权限未通过。请在浏览器地址栏允许摄像头/麦克风，然后点击重试。", true);
          }
        }

        window.addEventListener("DOMContentLoaded", () => {
          document.getElementById("launchButton")?.addEventListener("click", launch);
        });
      })();
    </script>
  </body>
</html>
